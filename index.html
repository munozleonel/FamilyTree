<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --bg2: #ede7d9;
    --ink: #2c2416;
    --ink-light: #7a6a55;
    --male: #3b7ec8;
    --male-light: #d0e4f7;
    --female: #c84b8a;
    --female-light: #f7d0e8;
    --line: #b8a898;
    --line-active: #5a3a20;
    --card-bg: #fffdf8;
    --card-shadow: 0 2px 12px rgba(44,36,22,0.10);
    --grey-text: #b0a898;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'Lato', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    overflow-x: auto;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 22px 20px 14px;
    background: var(--bg2);
    border-bottom: 1.5px solid #d6cfc4;
    position: sticky; top: 0; z-index: 300;
  }
  header h1 { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:700; color:var(--ink); }
  header p  { font-size:0.71rem; color:var(--ink-light); margin-top:3px; letter-spacing:.1em; text-transform:uppercase; }
  .hint     { font-size:0.70rem; color:var(--ink-light); margin-top:5px; font-style:italic; }
  #deselect-btn {
    margin-top:7px; display:none;
    background:var(--ink); color:#fff; border:none; border-radius:20px;
    padding:5px 16px; font-size:.71rem; cursor:pointer;
    font-family:'Lato',sans-serif; letter-spacing:.08em; text-transform:uppercase;
    transition:background .2s;
  }
  #deselect-btn:hover { background:#5a3a20; }

  /* ── TREE ── */
  #tree-container { padding:40px 60px 100px; min-width:max-content; }
  #tree-wrapper   { position:relative; display:inline-block; min-width:100%; }
  #lines-svg      { position:absolute; top:0; left:0; pointer-events:none; z-index:1; overflow:visible; }

  .gen-block { margin-bottom:80px; position:relative; z-index:2; }
  .generation-label {
    font-family:'Playfair Display',serif; font-size:.69rem;
    letter-spacing:.18em; text-transform:uppercase;
    color:var(--ink-light); margin-bottom:14px;
    padding-left:10px; border-left:3px solid #c8bfb0;
  }
  .generation-row { display:flex; flex-direction:row; align-items:flex-start; flex-wrap:nowrap; }
  .couple-unit    { display:flex; flex-direction:row; align-items:flex-start; }
  .unit-spacer    { width:26px; flex-shrink:0; }

  /* ── CARD ── */
  .person-card {
    display:flex; flex-direction:column; align-items:center;
    width:88px; cursor:pointer;
    padding:9px 5px 8px; border-radius:14px;
    background:var(--card-bg); box-shadow:var(--card-shadow);
    border:2px solid transparent;
    transition:box-shadow .2s, border-color .2s, opacity .3s, filter .3s, transform .15s;
    position:relative; margin:0 4px; user-select:none;
  }
  .person-card:hover                { box-shadow:0 4px 20px rgba(44,36,22,.18); transform:translateY(-2px); }
  .person-card.greyed               { opacity:.16; filter:grayscale(.8); pointer-events:none; }
  .person-card.selected-lineage     { opacity:1; filter:none; }
  .person-card.selected             { border-color:var(--ink); box-shadow:0 0 0 3px rgba(90,58,32,.2),0 6px 24px rgba(90,58,32,.2); transform:translateY(-2px); }

  /* ── ICON ── */
  .icon-wrap {
    width:42px; height:42px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    margin-bottom:6px; flex-shrink:0; position:relative; overflow:hidden;
    cursor:pointer;
  }
  .icon-male   { background:var(--male-light); }
  .icon-female { background:var(--female-light); }
  .icon-male   svg { fill:var(--male); }
  .icon-female svg { fill:var(--female); }
  .icon-wrap .photo-img {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; border-radius:50%;
  }
  .person-card.greyed .icon-wrap { background:#e4e0db !important; }
  .person-card.greyed .icon-wrap svg { fill:#b8b0a5 !important; }

  /* ── NAME / DOB ── */
  .person-name {
    font-size:.60rem; font-weight:700; text-align:center; line-height:1.25;
    color:var(--ink); letter-spacing:.02em; text-transform:uppercase;
    margin-bottom:3px; min-height:20px;
  }
  .person-surname { font-weight:300; font-size:.54rem; display:block; }
  .person-card.greyed .person-name { color:var(--grey-text); }

  .person-dob {
    font-size:.54rem; color:var(--ink-light); text-align:center;
    letter-spacing:.02em; min-height:12px; cursor:context-menu;
    border-radius:4px; padding:1px 4px;
    transition:background .15s;
  }
  .person-dob:hover { background:rgba(90,58,32,.08); }
  .person-card.greyed .person-dob { color:var(--grey-text); }

  /* ── CONTEXT MENU ── */
  .ctx-menu {
    position:fixed; z-index:9999;
    background:#fffdf8; border:1px solid #d6cfc4;
    border-radius:10px; box-shadow:0 8px 32px rgba(44,36,22,.18);
    padding:6px 0; min-width:170px;
    font-size:.78rem; font-family:'Lato',sans-serif;
    animation:menuFade .12s ease;
  }
  @keyframes menuFade { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
  .ctx-item {
    padding:8px 16px; cursor:pointer; color:var(--ink);
    display:flex; align-items:center; gap:8px;
    transition:background .1s;
  }
  .ctx-item:hover { background:#f0e8dc; }
  .ctx-item svg   { width:14px; height:14px; fill:var(--ink-light); flex-shrink:0; }
  .ctx-sep        { height:1px; background:#e8e0d4; margin:4px 0; }

  /* ── MODAL (DOB edit) ── */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(44,36,22,.35);
    z-index:9998; display:flex; align-items:center; justify-content:center;
    animation:fadeIn .15s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal-box {
    background:var(--card-bg); border-radius:18px;
    box-shadow:0 16px 60px rgba(44,36,22,.22);
    padding:28px 32px 24px; min-width:300px; max-width:360px;
    font-family:'Lato',sans-serif;
  }
  .modal-box h3 { font-family:'Playfair Display',serif; font-size:1.1rem; margin-bottom:16px; color:var(--ink); }
  .modal-box label { font-size:.75rem; color:var(--ink-light); text-transform:uppercase; letter-spacing:.08em; display:block; margin-bottom:5px; }
  .modal-box input[type="date"] {
    width:100%; padding:9px 12px; border:1.5px solid #d6cfc4;
    border-radius:9px; font-size:.88rem; font-family:'Lato',sans-serif;
    color:var(--ink); background:#fff; outline:none;
    transition:border-color .2s;
  }
  .modal-box input[type="date"]:focus { border-color:#8a7a6a; }
  .modal-actions { display:flex; gap:10px; margin-top:20px; justify-content:flex-end; }
  .btn-cancel {
    padding:7px 18px; border:1.5px solid #d6cfc4; border-radius:20px;
    background:transparent; cursor:pointer; font-size:.75rem;
    font-family:'Lato',sans-serif; color:var(--ink-light);
    transition:background .15s;
  }
  .btn-cancel:hover { background:#f0e8dc; }
  .btn-save {
    padding:7px 20px; border:none; border-radius:20px;
    background:var(--ink); color:#fff; cursor:pointer;
    font-size:.75rem; font-family:'Lato',sans-serif;
    letter-spacing:.06em; transition:background .15s;
  }
  .btn-save:hover { background:#5a3a20; }
  .btn-clear {
    padding:7px 16px; border:1.5px solid #e0aaaa; border-radius:20px;
    background:transparent; cursor:pointer; font-size:.75rem;
    font-family:'Lato',sans-serif; color:#c06060;
    transition:background .15s; margin-right:auto;
  }
  .btn-clear:hover { background:#fdf0f0; }
</style>
</head>

function formatDob(dob) {
  if (!dob) return '';
  const d = new Date(dob + 'T00:00:00');
  if (isNaN(d)) return '';
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

function getDob(id) {

    <div class="person-dob" data-dob-id="${id}">${formatDob(getDob(id)) || '—'}</div>

  });

  // Right-click on icon → photo menu
  div.querySelector('.icon-wrap').addEventListener('contextmenu', (e) => {
    e.preventDefault(); e.stopPropagation();
    showPhotoMenu(id, e.clientX, e.clientY);
  });

  // Right-click on DOB → edit DOB menu
  div.querySelector('.person-dob').addEventListener('contextmenu', (e) => {
    e.preventDefault(); e.stopPropagation();
    showDobMenu(id, e.clientX, e.clientY);
  });

  nodeEls[id] = div;
  return div;
}

function refreshCard(id) {
  const div = nodeEls[id];
  if (!div) return;
  const p = people[id];
  const isMale = p.gender === 'M';

  // Refresh icon (photo)
  const iconEl = div.querySelector('.icon-wrap');
  iconEl.innerHTML = (isMale ? maleSVG : femaleSVG);
  if (photoOverrides[id]) {
    const img = document.createElement('img');
    img.className = 'photo-img';
    img.src = photoOverrides[id];
    iconEl.appendChild(img);
  }

  // Refresh DOB
  const dobEl = div.querySelector('.person-dob');
  dobEl.textContent = formatDob(getDob(id)) || '—';
}

const treeRoot = document.getElementById('tree-root');

genLayout.forEach((gen) => {
  const block = document.createElement('div');
  block.className = 'gen-block';

  const lbl = document.createElement('div');
  lbl.className = 'generation-label';
  lbl.textContent = gen.label;
  block.appendChild(lbl);

  const row = document.createElement('div');
  row.className = 'generation-row';

  gen.units.forEach((unit, ui) => {
    if (ui > 0) {
      const sp = document.createElement('div');
      sp.className = 'unit-spacer';
      row.appendChild(sp);
    }
    const unitDiv = document.createElement('div');
    unitDiv.className = 'couple-unit';
    unit.ids.forEach(id => {
      const card = buildCard(id);
      if (card) unitDiv.appendChild(card);
    });
    row.appendChild(unitDiv);
  });

  block.appendChild(row);
  treeRoot.appendChild(block);
});

// ─── LINE DRAWING ─────────────────────────────────────────────────────────────
const svgEl = document.getElementById('lines-svg');
const NS = 'http://www.w3.org/2000/svg';
let lineRecords = [];

function getOffsetPos(el, ancestor) {
  let x = 0, y = 0, cur = el;
  while (cur && cur !== ancestor) { x += cur.offsetLeft; y += cur.offsetTop; cur = cur.offsetParent; }
  return { x, y };
}

function getIconRect(id) {
  const el = nodeEls[id];
  if (!el) return null;
  const wrapper = document.getElementById('tree-wrapper');
  const icon = el.querySelector('.icon-wrap');
  const pos = getOffsetPos(icon, wrapper);
  const w = icon.offsetWidth, h = icon.offsetHeight;
  return { cx: pos.x + w/2, cy: pos.y + h/2, top: pos.y, bottom: pos.y + h };
}

function mkPath(d, stroke, sw, dash, opacity) {
  const path = document.createElementNS(NS, 'path');
  path.setAttribute('d', d);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', stroke || 'var(--line)');
  path.setAttribute('stroke-width', sw || '1.8');
  path.setAttribute('stroke-linecap', 'round');
  if (dash)    path.setAttribute('stroke-dasharray', dash);
  if (opacity != null) path.setAttribute('opacity', String(opacity));
  return path;
}

function drawAllLines(lineageSet) {
  svgEl.innerHTML = '';
  lineRecords = [];
  const wrapper = document.getElementById('tree-wrapper');
  svgEl.setAttribute('width',  wrapper.scrollWidth  + 60);
  svgEl.setAttribute('height', wrapper.scrollHeight + 60);

  genLayout.forEach(gen => {
    gen.units.forEach(unit => {
      const ids      = unit.ids      || [];
      const childIds = unit.children || [];

      // Spouse connector
      if (ids.length === 2) {
        const ra = getIconRect(ids[0]), rb = getIconRect(ids[1]);
        if (ra && rb) {
          const mx = (ra.cx + rb.cx) / 2, my = (ra.cy + rb.cy) / 2;
          const path = mkPath(`M ${ra.cx} ${ra.cy} Q ${mx} ${my - 8} ${rb.cx} ${rb.cy}`,
            'var(--line)', '1.5', '5,3', 0.7);
          svgEl.appendChild(path);
          lineRecords.push({ path, parentIds: ids, childIds: [] });
        }
      }

      // Parent → child
      if (childIds.length > 0) {
        const vParents  = ids.filter(id => nodeEls[id]);
        const vChildren = childIds.filter(id => nodeEls[id]);
        if (!vParents.length || !vChildren.length) return;

        const pRects = vParents.map(id => getIconRect(id)).filter(Boolean);
        const parentMidX   = pRects.reduce((s,r) => s + r.cx, 0) / pRects.length;
        const parentBottom = Math.max(...pRects.map(r => r.bottom));
        const dropY        = parentBottom + 30;

        const cRects   = vChildren.map(id => getIconRect(id)).filter(Boolean);
        const childCxs = cRects.map(r => r.cx);
        const childMeetY = Math.min(...cRects.map(r => r.top)) - 20;

        // Stem down
        const stem = mkPath(`M ${parentMidX} ${parentBottom} L ${parentMidX} ${dropY}`, 'var(--line)', '1.8');
        svgEl.appendChild(stem);
        lineRecords.push({ path: stem, parentIds: ids, childIds });

        if (vChildren.length > 1) {
          const barCx = (Math.min(...childCxs) + Math.max(...childCxs)) / 2;
          if (Math.abs(parentMidX - barCx) > 4) {
            const cy1 = dropY + (childMeetY - dropY) * 0.55;
            const elbow = mkPath(
              `M ${parentMidX} ${dropY} C ${parentMidX} ${cy1}, ${barCx} ${cy1}, ${barCx} ${childMeetY}`,
              'var(--line)', '1.8');
            svgEl.appendChild(elbow);
            lineRecords.push({ path: elbow, parentIds: ids, childIds });
          }
          const bus = mkPath(
            `M ${Math.min(...childCxs)} ${childMeetY} L ${Math.max(...childCxs)} ${childMeetY}`,
            'var(--line)', '1.8');
          svgEl.appendChild(bus);
          lineRecords.push({ path: bus, parentIds: ids, childIds });
        }

        vChildren.forEach((cid, i) => {
          const cr    = cRects[i];
          const fromX = cr.cx;
          const fromY = vChildren.length > 1 ? childMeetY : dropY;
          let d;
          if (vChildren.length > 1 || Math.abs(fromX - parentMidX) < 4) {
            d = `M ${fromX} ${fromY} L ${fromX} ${cr.top}`;
          } else {
            const midY = (fromY + cr.top) / 2;
            d = `M ${fromX} ${fromY} C ${fromX} ${midY}, ${cr.cx} ${midY}, ${cr.cx} ${cr.top}`;
          }
          const path = mkPath(d, 'var(--line)', '1.8');
          svgEl.appendChild(path);
          lineRecords.push({ path, parentIds: ids, childIds: [cid] });
        });
      }
    });
  });

  applyLineStyle(lineageSet);
}

function applyLineStyle(lineageSet) {
  lineRecords.forEach(({ path, parentIds, childIds }) => {
    if (!lineageSet) {
      path.setAttribute('stroke', 'var(--line)');
      path.setAttribute('opacity', '1');
      path.setAttribute('stroke-width', '1.8');
      return;
    }
    const active = [...parentIds, ...childIds].some(id => lineageSet.has(id));
    if (active) {
      path.setAttribute('stroke', 'var(--line-active)');
      path.setAttribute('opacity', '1');
      path.setAttribute('stroke-width', '2.3');
    } else {
      path.setAttribute('stroke', '#ccc');
      path.setAttribute('opacity', '0.15');
      path.setAttribute('stroke-width', '1.5');
    }
  });
}

// ─── LINEAGE SELECTION ────────────────────────────────────────────────────────
let selectedId = null;

function getLineage(id) {
  const set = new Set([id]);
  function walkUp(pid) {
    if (!pid || set.has(pid)) return;
    set.add(pid);
    const p = people[pid]; if (!p) return;
    (p.spouse||[]).forEach(s => { if (!set.has(s)) { set.add(s); walkUp(people[s]?.father); walkUp(people[s]?.mother); }});
    walkUp(p.father); walkUp(p.mother);
  }
  function walkDown(pid) {
    Object.values(people).forEach(p => {
      if ((p.father === pid || p.mother === pid) && !set.has(p.id)) {
        set.add(p.id); (p.spouse||[]).forEach(s => set.add(s)); walkDown(p.id);
      }
    });
  }
  const p = people[id]; if (!p) return set;
  (p.spouse||[]).forEach(s => set.add(s));
  walkUp(p.father); walkUp(p.mother);
  walkDown(id); (p.spouse||[]).forEach(s => walkDown(s));
  return set;
}

function selectPerson(id) {
  if (selectedId === id) { deselectAll(); return; }
  selectedId = id;
  document.getElementById('deselect-btn').style.display = 'inline-block';
  const lineage = getLineage(id);
  Object.entries(nodeEls).forEach(([eid, el]) => {
    el.classList.remove('selected','selected-lineage','greyed');
    const n = parseInt(eid);
    if      (n === id)       el.classList.add('selected','selected-lineage');
    else if (lineage.has(n)) el.classList.add('selected-lineage');
    else                     el.classList.add('greyed');
  });
  drawAllLines(lineage);
}

function deselectAll() {
  selectedId = null;
  document.getElementById('deselect-btn').style.display = 'none';
  Object.values(nodeEls).forEach(el => el.classList.remove('selected','selected-lineage','greyed'));
  drawAllLines(null);
}

// ─── CONTEXT MENU ─────────────────────────────────────────────────────────────
const ctxMenu = document.getElementById('ctx-menu');
let ctxTargetId = null;

function showCtxMenu(x, y, items) {
  ctxMenu.innerHTML = '';
  items.forEach((item, i) => {
    if (item === 'sep') {
      const sep = document.createElement('div'); sep.className = 'ctx-sep';
      ctxMenu.appendChild(sep);
    } else {
      const el = document.createElement('div');
      el.className = 'ctx-item';
      el.innerHTML = `${item.icon || ''}<span>${item.label}</span>`;
      el.addEventListener('click', () => { hideCtxMenu(); item.action(); });
      ctxMenu.appendChild(el);
    }
  });
  ctxMenu.style.display = 'block';
  // Position: keep within viewport
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = x + 4, top = y + 4;
  ctxMenu.style.left = '0'; ctxMenu.style.top = '0';
  const mw = ctxMenu.offsetWidth, mh = ctxMenu.offsetHeight;
  if (left + mw > vw - 8) left = x - mw - 4;
  if (top  + mh > vh - 8) top  = y - mh - 4;
  ctxMenu.style.left = left + 'px';
  ctxMenu.style.top  = top  + 'px';
}

function hideCtxMenu() { ctxMenu.style.display = 'none'; }

document.addEventListener('click',       hideCtxMenu);
document.addEventListener('contextmenu', (e) => { if (!e.target.closest('.icon-wrap') && !e.target.closest('.person-dob')) hideCtxMenu(); });

// Photo context menu
function showPhotoMenu(id, x, y) {
  ctxTargetId = id;
  const hasPhoto = !!photoOverrides[id];
  const items = [
    {
      icon: `<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm0 2a8 8 0 1 1 0 16A8 8 0 0 1 12 4zm-1 4v3H8l4 4 4-4h-3V8h-2zm-5 8v2h10v-2H6z"/></svg>`,
      label: hasPhoto ? 'Replace Photo' : 'Upload Photo',
      action: () => triggerPhotoUpload(id)
    },
  ];
  if (hasPhoto) {
    items.push('sep');
    items.push({
      icon: `<svg viewBox="0 0 24 24"><path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>`,
      label: 'Remove Photo',
      action: () => { delete photoOverrides[id]; refreshCard(id); }
    });
  }
  showCtxMenu(x, y, items);
}

// DOB context menu
function showDobMenu(id, x, y) {
  ctxTargetId = id;
  showCtxMenu(x, y, [
    {
      icon: `<svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>`,
      label: 'Edit Date of Birth',
      action: () => openDobModal(id)
    }
  ]);
}

// ─── PHOTO UPLOAD ─────────────────────────────────────────────────────────────
const photoInput = document.getElementById('photo-file-input');
let photoTargetId = null;

function triggerPhotoUpload(id) {
  photoTargetId = id;
  photoInput.value = '';
  photoInput.click();
}

photoInput.addEventListener('change', () => {
  const file = photoInput.files[0];
  if (!file || !photoTargetId) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    photoOverrides[photoTargetId] = e.target.result;
    refreshCard(photoTargetId);
    photoTargetId = null;
  };
  reader.readAsDataURL(file);
});

// ─── DOB MODAL ────────────────────────────────────────────────────────────────
const modalOverlay  = document.getElementById('modal-overlay');
const modalInput    = document.getElementById('modal-date-input');
const modalTitle    = document.getElementById('modal-title');
let modalTargetId   = null;

function openDobModal(id) {
  modalTargetId = id;
  const p = people[id];
  modalTitle.textContent = `Edit DOB — ${p.first} ${p.last}`;
  const cur = getDob(id);
  modalInput.value = cur || '';
  modalOverlay.style.display = 'flex';
  setTimeout(() => modalInput.focus(), 50);
}

function closeModal(e) {
  if (e && e.target !== modalOverlay) return;
  modalOverlay.style.display = 'none';
  modalTargetId = null;
}

function saveDob() {
  if (modalTargetId == null) return;
  const val = modalInput.value;
  dobOverrides[modalTargetId] = val || null;
  refreshCard(modalTargetId);
  modalOverlay.style.display = 'none';
  modalTargetId = null;
}

function clearDob() {
  if (modalTargetId == null) return;
  dobOverrides[modalTargetId] = null;
  refreshCard(modalTargetId);
  modalOverlay.style.display = 'none';
  modalTargetId = null;
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeModal(); hideCtxMenu(); }
  if (e.key === 'Enter' && modalOverlay.style.display === 'flex') saveDob();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  // Wait for fonts + layout to fully settle before drawing lines
  setTimeout(() => drawAllLines(null), 300);
});
window.addEventListener('resize', () => drawAllLines(selectedId ? getLineage(selectedId) : null));
</script>
