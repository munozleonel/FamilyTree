<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --bg2: #ede7d9;
    --ink: #2c2416;
    --ink-light: #7a6a55;
    --male: #3b7ec8;
    --male-light: #d0e4f7;
    --female: #c84b8a;
    --female-light: #f7d0e8;
    --line: #b8a898;
    --line-active: #5a3a20;
    --card-bg: #fffdf8;
    --card-shadow: 0 2px 12px rgba(44,36,22,0.10);
    --grey-text: #b8b0a5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Lato', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    overflow-x: auto;
  }

  header {
    text-align: center;
    padding: 24px 20px 14px;
    background: var(--bg2);
    border-bottom: 1.5px solid #d6cfc4;
    position: sticky;
    top: 0;
    z-index: 200;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.85rem;
    font-weight: 700;
    color: var(--ink);
  }

  header p {
    font-size: 0.72rem;
    color: var(--ink-light);
    margin-top: 3px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .hint {
    font-size: 0.72rem;
    color: var(--ink-light);
    margin-top: 5px;
    font-style: italic;
  }

  #deselect-btn {
    margin-top: 7px;
    display: none;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 5px 16px;
    font-size: 0.72rem;
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  #deselect-btn:hover { background: #5a3a20; }

  #tree-container {
    padding: 40px 60px 100px;
    min-width: max-content;
  }

  #tree-wrapper {
    position: relative;
    display: inline-block;
    min-width: 100%;
  }

  #lines-svg {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 1;
    overflow: visible;
  }

  .gen-block {
    margin-bottom: 80px;
    position: relative;
    z-index: 2;
  }

  .generation-label {
    font-family: 'Playfair Display', serif;
    font-size: 0.70rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 14px;
    padding-left: 10px;
    border-left: 3px solid #c8bfb0;
  }

  .generation-row {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    flex-wrap: nowrap;
    gap: 0;
  }

  .couple-unit {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    position: relative;
  }

  .unit-spacer { width: 28px; flex-shrink: 0; }

  .person-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 86px;
    cursor: pointer;
    padding: 10px 5px 8px;
    border-radius: 14px;
    background: var(--card-bg);
    box-shadow: var(--card-shadow);
    border: 2px solid transparent;
    transition: box-shadow 0.2s, border-color 0.2s, opacity 0.3s, filter 0.3s, transform 0.15s;
    position: relative;
    margin: 0 4px;
    user-select: none;
  }

  .person-card:hover {
    box-shadow: 0 4px 20px rgba(44,36,22,0.18);
    transform: translateY(-2px);
  }

  .person-card.greyed {
    opacity: 0.18;
    filter: grayscale(0.8);
    pointer-events: none;
  }

  .person-card.selected-lineage { opacity: 1; filter: none; }

  .person-card.selected {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(90,58,32,0.2), 0 6px 24px rgba(90,58,32,0.2);
    transform: translateY(-2px);
  }

  .icon-wrap {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 6px;
    flex-shrink: 0;
  }

  .icon-male { background: var(--male-light); }
  .icon-female { background: var(--female-light); }
  .icon-male svg { fill: var(--male); }
  .icon-female svg { fill: var(--female); }
  .person-card.greyed .icon-wrap { background: #e4e0db !important; }
  .person-card.greyed .icon-wrap svg { fill: #b8b0a5 !important; }

  .person-name {
    font-size: 0.61rem;
    font-weight: 700;
    text-align: center;
    line-height: 1.25;
    color: var(--ink);
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin-bottom: 3px;
    min-height: 20px;
  }
  .person-surname {
    font-weight: 300;
    font-size: 0.55rem;
    display: block;
  }
  .person-card.greyed .person-name { color: var(--grey-text); }

  .person-dob {
    font-size: 0.55rem;
    color: var(--ink-light);
    text-align: center;
    letter-spacing: 0.02em;
    min-height: 12px;
  }
  .person-card.greyed .person-dob { color: var(--grey-text); }
</style>
</head>

</header>

const nodeEls = {};

function formatDob(dob) {
  if (!dob) return '';
  const d = new Date(dob);
  if (isNaN(d)) return '';
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

function maleSVG() {

    <path d="M14.5 2h5.5v5.5l-2-2-4.2 4.2A6 6 0 1 1 9 3.07L11.5 5.5 14.5 2zM9 8a4 4 0 1 0 0 8A4 4 0 0 0 9 8z"/>
  </svg>`;
}

function femaleSVG() {
  return `<svg width="21" height="21" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 2a6 6 0 1 1-3.5 10.8L11 16h1.5v2H11v3H9v-3H7.5v-2H9l-2.5-3.2A6 6 0 0 1 12 2zm0 2a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/>
  </svg>`;
}

function buildCard(id) {
  const p = people[id];
  if (!p) return null;
  const div = document.createElement('div');
  div.className = 'person-card';
  div.dataset.id = String(id);
  const isMale = p.gender === 'M';
  div.innerHTML = `
    <div class="icon-wrap ${isMale ? 'icon-male' : 'icon-female'}">${isMale ? maleSVG() : femaleSVG()}</div>
    <div class="person-name">${p.first}<span class="person-surname">${p.last}</span></div>
    <div class="person-dob">${formatDob(p.dob)}</div>
  `;
  div.addEventListener('click', () => selectPerson(id));
  nodeEls[id] = div;
  return div;
}

  block.appendChild(lbl);

  gen.units.forEach((unit, ui) => {

      sp.className = 'unit-spacer';
      row.appendChild(sp);
    }

    unit.ids.forEach(id => {

    });
    row.appendChild(unitDiv);
  });

});

// ─── LINE DRAWING ─────────────────────────────────────────────────────────────
const svgEl = document.getElementById('lines-svg');
const NS = 'http://www.w3.org/2000/svg';
let lineRecords = [];

function getCardIconRect(id) {
  const el = nodeEls[id];
  if (!el) return null;
  const wrapper = document.getElementById('tree-wrapper');
  const wr = wrapper.getBoundingClientRect();
  const iconEl = el.querySelector('.icon-wrap');
  const ir = iconEl.getBoundingClientRect();
  return {
    iconCx:     ir.left - wr.left + ir.width / 2,
    iconCy:     ir.top  - wr.top  + ir.height / 2,
    iconBottom: ir.top  - wr.top  + ir.height,
    iconTop:    ir.top  - wr.top,
  };
}

function makePath(d, stroke, sw, dasharray, opacity) {
  const path = document.createElementNS(NS, 'path');
  path.setAttribute('d', d);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', stroke || 'var(--line)');
  path.setAttribute('stroke-width', sw || '1.8');
  path.setAttribute('stroke-linecap', 'round');
  if (dasharray) path.setAttribute('stroke-dasharray', dasharray);
  if (opacity !== undefined) path.setAttribute('opacity', String(opacity));
  return path;
}

function drawAllLines(lineageSet) {
  svgEl.innerHTML = '';
  lineRecords = [];

  const wrapper = document.getElementById('tree-wrapper');
  svgEl.setAttribute('width',  wrapper.scrollWidth  + 40);
  svgEl.setAttribute('height', wrapper.scrollHeight + 40);

  genLayout.forEach(gen => {
    gen.units.forEach(unit => {
      const ids      = unit.ids      || [];
      const childIds = unit.children || [];

      // ── Spouse connector (dashed curve) ──────────────────────────────────
      if (ids.length === 2) {
        const ra = getCardIconRect(ids[0]);
        const rb = getCardIconRect(ids[1]);
        if (ra && rb) {
          const mx = (ra.iconCx + rb.iconCx) / 2;
          const my = (ra.iconCy + rb.iconCy) / 2;
          const d  = `M ${ra.iconCx} ${ra.iconCy} Q ${mx} ${my - 8} ${rb.iconCx} ${rb.iconCy}`;
          const path = makePath(d, 'var(--line)', '1.5', '5,3', 0.7);
          svgEl.appendChild(path);
          lineRecords.push({ path, parentIds: ids, childIds: [] });
        }
      }

      // ── Parent → child connectors ─────────────────────────────────────────
      if (childIds.length > 0) {
        const validParents  = ids.filter(id => nodeEls[id]);
        const validChildren = childIds.filter(id => nodeEls[id]);
        if (!validParents.length || !validChildren.length) return;

        // Mid-X between parents
        const pRects = validParents.map(id => getCardIconRect(id));
        const parentMidX   = pRects.reduce((s, r) => s + r.iconCx, 0) / pRects.length;
        const parentBottom = pRects[0].iconBottom;
        const dropY        = parentBottom + 32;

        const cRects  = validChildren.map(id => getCardIconRect(id));
        const childCxs = cRects.map(r => r.iconCx);
        const childMeetY = Math.min(...cRects.map(r => r.iconTop)) - 20;

        // Vertical stem down from parent midpoint
        const stemPath = makePath(
          `M ${parentMidX} ${parentBottom} L ${parentMidX} ${dropY}`,
          'var(--line)', '1.8'
        );
        svgEl.appendChild(stemPath);
        lineRecords.push({ path: stemPath, parentIds: ids, childIds });

        if (validChildren.length > 1) {
          // Curved elbow from dropY → centre of child bar at childMeetY
          const barCentreX = (Math.min(...childCxs) + Math.max(...childCxs)) / 2;
          if (Math.abs(parentMidX - barCentreX) > 4) {
            const cy1 = dropY + (childMeetY - dropY) * 0.55;
            const elbow = makePath(
              `M ${parentMidX} ${dropY} C ${parentMidX} ${cy1}, ${barCentreX} ${cy1}, ${barCentreX} ${childMeetY}`,
              'var(--line)', '1.8'
            );
            svgEl.appendChild(elbow);
            lineRecords.push({ path: elbow, parentIds: ids, childIds });
          }

          // Horizontal bus across all children
          const busPath = makePath(
            `M ${Math.min(...childCxs)} ${childMeetY} L ${Math.max(...childCxs)} ${childMeetY}`,
            'var(--line)', '1.8'
          );
          svgEl.appendChild(busPath);
          lineRecords.push({ path: busPath, parentIds: ids, childIds });
        }

        // Vertical drop from bus (or dropY if single child) to each child icon
        validChildren.forEach((cid, i) => {
          const cr    = cRects[i];
          const fromX = cr.iconCx;
          const fromY = validChildren.length > 1 ? childMeetY : dropY;
          let d;
          if (validChildren.length > 1 || Math.abs(fromX - parentMidX) < 4) {
            d = `M ${fromX} ${fromY} L ${fromX} ${cr.iconTop}`;
          } else {
            const midY = (fromY + cr.iconTop) / 2;
            d = `M ${fromX} ${fromY} C ${fromX} ${midY}, ${cr.iconCx} ${midY}, ${cr.iconCx} ${cr.iconTop}`;
          }
          const path = makePath(d, 'var(--line)', '1.8');
          svgEl.appendChild(path);
          lineRecords.push({ path, parentIds: ids, childIds: [cid] });
        });
      }
    });
  });

  applyLineStyle(lineageSet);
}

// ─── SELECTION & LINEAGE ──────────────────────────────────────────────────────
let selectedId = null;

function getLineage(id) {
  const set = new Set([id]);

  function walkUp(pid) {
    if (!pid || set.has(pid)) return;
    set.add(pid);
    const p = people[pid];
    if (!p) return;
    (p.spouse || []).forEach(s => {
      if (!set.has(s)) { set.add(s); walkUp(people[s]?.father); walkUp(people[s]?.mother); }
    });
    walkUp(p.father);
    walkUp(p.mother);
  }

  function walkDown(pid) {
    Object.values(people).forEach(p => {
      if ((p.father === pid || p.mother === pid) && !set.has(p.id)) {
        set.add(p.id);
        (p.spouse || []).forEach(s => set.add(s));
        walkDown(p.id);
      }
    });
  }

  const p = people[id];
  if (!p) return set;
  (p.spouse || []).forEach(s => set.add(s));
  walkUp(p.father);
  walkUp(p.mother);
  walkDown(id);
  (p.spouse || []).forEach(s => walkDown(s));
  return set;
}

function applyLineStyle(lineageSet) {
  lineRecords.forEach(({ path, parentIds, childIds }) => {
    if (!lineageSet) {
      path.setAttribute('stroke', 'var(--line)');
      path.setAttribute('opacity', '1');
      path.setAttribute('stroke-width', '1.8');
      return;
    }
    const active = [...parentIds, ...childIds].some(id => lineageSet.has(id));
    if (active) {
      path.setAttribute('stroke', 'var(--line-active)');
      path.setAttribute('opacity', '1');
      path.setAttribute('stroke-width', '2.3');
    } else {
      path.setAttribute('stroke', '#ccc');
      path.setAttribute('opacity', '0.18');
      path.setAttribute('stroke-width', '1.5');
    }
  });
}

function selectPerson(id) {
  if (selectedId === id) { deselectAll(); return; }
  selectedId = id;
  document.getElementById('deselect-btn').style.display = 'inline-block';
  const lineage = getLineage(id);
  Object.entries(nodeEls).forEach(([eid, el]) => {
    el.classList.remove('selected', 'selected-lineage', 'greyed');
    const numId = parseInt(eid);
    if      (numId === id)        el.classList.add('selected', 'selected-lineage');
    else if (lineage.has(numId))  el.classList.add('selected-lineage');
    else                          el.classList.add('greyed');
  });
  drawAllLines(lineage);
}

function deselectAll() {
  selectedId = null;
  document.getElementById('deselect-btn').style.display = 'none';
  Object.values(nodeEls).forEach(el =>
    el.classList.remove('selected', 'selected-lineage', 'greyed')
  );
  drawAllLines(null);
}

window.addEventListener('load',   () => { setTimeout(() => drawAllLines(null), 150); });
window.addEventListener('resize', () => { drawAllLines(selectedId ? getLineage(selectedId) : null); });
</script>
